# RTP-LLM Multi-Benchmark Configuration
# This file defines various benchmark configurations for distributed inference testing

benchmarks:
  - name: "H20_Qwen3-Coder-480B-A35B-Instruct_Decode"
    # git config
    git_repo_url: "git@gitlab.alibaba-inc.com:foundation_models/RTP-LLM.git"
    git_checkout_ref: "origin/feature/yiyin_requirements"
    open_source_ref: "origin/feature/yiyin_multi_benchmark"
    # machine config
    ip_lists:
      - "33.105.178.103"
    run_user: "admin"
    ssh_port: 2222
    # model config
    tokenizer_path: "/mnt/fuse/nebula_model/nebula_internal/Qwen__Qwen3-Coder-480B-A35B-Instruct-FP8/main_f9ce52849043dbd3b48fdb9fa0e615fd56e9920a_e71c0f0f4c78/ckpt_base/"
    checkpoint_path: "/mnt/fuse/nebula_model/nebula_internal/Qwen__Qwen3-Coder-480B-A35B-Instruct-FP8/main_f9ce52849043dbd3b48fdb9fa0e615fd56e9920a_e71c0f0f4c78/ckpt_base/"
    model_type: "qwen_3_moe"
    # test config
    is_decode: true
    batch_size_list: "[8,16,32]"
    input_len_list: "[65536]"
    # test suit
    tp_size: [8]
    dp_size: [1]
    # build config
    bazel_build_args: '" --jobs 64 --verbose_failures --config=cuda12_6 "'
    # file dir config
    ft_sub_dir: "rtp_llm_perf_test"
    # model config
    start_port: 12333
    concurrency_limit: 32
    use_deepep_moe: true
    use_deepep_low_latency: true
    accl_dispatch_num_warp_groups: 4
    accl_combine_num_warp_groups: 4
    accl_low_latency_optimize: 1
    accl_fp8_cast_level: 1
    decode_test_length: 2048
    warm_up: 1
    act_type: "bf16"
    weight_type: "fp8"
    reserver_runtime_mem_mb: 0
    device_reserve_memory_bytes: 0
    hack_layer_num: 10
    load_ckpt_num_process: 96
    max_context_batch_size: 1
    enable_merge_w13: true
    enable_layer_micro_batch: 0
    enable_comm_overlap: false
    
